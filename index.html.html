<script>
/* =====================================================
   네이버 블로그 경유 접속 제한
   - blog.naver.com / m.blog.naver.com / section.blog.naver.com 경유만 허용
   - 대표님 테스트용: 주소 뒤에 ?test=1 붙이면 직접 접속 가능
   - GitHub Pages 기본단계용 간이 차단 방식
   ===================================================== */
(function () {
  const ref = document.referrer || "";

  const allowed =
    ref.includes("blog.naver.com") ||
    ref.includes("m.blog.naver.com") ||
    ref.includes("section.blog.naver.com");

  const testMode =
    new URLSearchParams(window.location.search).get("test") === "1";

  if (!allowed && !testMode) {
    document.documentElement.innerHTML = `
      <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <title>접근 제한</title>
        <style>
          body {
            margin:0;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            background:#eef2f7;
            font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
            color:#111827;
          }
          .access-box {
            width:min(92vw,560px);
            background:#fff;
            border:1px solid #dbe3f1;
            border-radius:28px;
            padding:36px 28px;
            text-align:center;
            box-shadow:0 18px 44px rgba(15,23,42,.12);
          }
          .access-box h1 {
            margin:0 0 12px;
            font-size:28px;
            font-weight:950;
            letter-spacing:-1px;
          }
          .access-box p {
            margin:8px 0;
            color:#475569;
            font-size:16px;
            line-height:1.7;
            font-weight:700;
          }
          .access-box .tag {
            display:inline-block;
            margin-top:16px;
            padding:8px 14px;
            border-radius:999px;
            background:#eff6ff;
            color:#2563eb;
            font-weight:950;
            font-size:13px;
          }
        </style>
      </head>
      <body>
        <div class="access-box">
          <h1>접근 제한</h1>
          <p>이 모의고사는 네이버 블로그 링크를 통해서만 이용할 수 있습니다.</p>
          <p>블로그 글의 링크를 통해 다시 접속해주세요.</p>
          <div class="tag">Naver Blog Access Only</div>
        </div>
      </body>
    `;
    throw new Error("Blocked: not from Naver Blog");
  }
})();
</script>

const questionsDiv=document.getElementById("questions");
questions.forEach((q,i)=>{questionsDiv.innerHTML += `<div class="qcard hidden" id="q${i+1}" data-exam="${q.exam}"><div class="meta"><span>${q.exam}</span><span>${q.subject}</span><span>${q.topic}</span></div><div class="qtitle">${i+1}. ${q.q}</div>${q.choices.map((c,idx)=>`<label class="choice" id="q${i+1}c${idx+1}"><input type="radio" name="q${i+1}" value="${idx+1}"><div class="num">${idx+1}</div><div>${c}</div></label>`).join("")}<div class="analysis"><b>해설</b><br>${q.analysis}</div></div>`;});
let currentExam="", totalSeconds=0, timer=null, submitted=false;
function startExam(type){currentExam=type;submitted=false;document.getElementById("landing").classList.add("hidden");document.getElementById("examWrap").classList.remove("hidden");const nickname=document.getElementById("nickname").value.trim();if(nickname){const badge=document.getElementById("nicknameBadge");badge.innerHTML="응시자 : "+nickname;badge.classList.remove("hidden");}if(type==="1차"){totalSeconds=100*60;document.getElementById("examTitle").innerHTML="1차 실전 CBT MOCK 02";document.getElementById("examDesc").innerHTML="부동산학개론 40문항 + 민법 및 민사특별법 40문항 = 총 80문항";}else{totalSeconds=150*60;document.getElementById("examTitle").innerHTML="2차 실전 CBT MOCK 02";document.getElementById("examDesc").innerHTML="중개사법 40 + 공법 40 + 공시법 24 + 세법 16 = 총 120문항";}document.querySelectorAll(".qcard").forEach(card=>{card.dataset.exam===type?card.classList.remove("hidden"):card.classList.add("hidden");});renderOMR();updateTimer();timer=setInterval(updateTimer,1000);window.scrollTo(0,0);}
function updateTimer(){let m=Math.floor(totalSeconds/60),s=totalSeconds%60;document.getElementById("timer").innerHTML=String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");if(totalSeconds<=0){gradeExam(true);return;}totalSeconds--;}
function visibleCards(){return Array.from(document.querySelectorAll(".qcard:not(.hidden)"));}
function renderOMR(){const omr=document.getElementById("omr");omr.innerHTML="";visibleCards().forEach((card,idx)=>{const checked=card.querySelector("input:checked");let cls=checked?"done":"";omr.innerHTML += `<button class="${cls}" onclick="document.getElementById('${card.id}').scrollIntoView({behavior:'smooth'})">${idx+1}</button>`;});}
document.addEventListener("change",renderOMR);
function gradeExam(auto=false){if(submitted)return;if(!auto&&!confirm("답안을 제출할까요? 제출 후 정답과 해설이 공개됩니다."))return;submitted=true;clearInterval(timer);let total=0,correct=0,blank=0;visibleCards().forEach(card=>{total++;const idx=Number(card.id.replace("q",""))-1;const q=questions[idx];const checked=card.querySelector("input:checked");card.classList.add("checked");document.getElementById("q"+(idx+1)+"c"+q.answer).classList.add("correct");if(!checked){blank++;}else if(Number(checked.value)===q.answer){correct++;}else{checked.parentElement.classList.add("wrong");}});let score=Math.round(correct/total*100);document.getElementById("result").innerHTML=`<b>채점 결과</b><br>${currentExam} 총점 : ${score}점<br>정답 : ${correct}/${total}<br>미응답 : ${blank}개<br><br>${score>=85?"상위 합격권":score>=70?"합격권":score>=60?"불안한 합격권":"위험권"}`;renderOMR();window.scrollTo(0,0);}
window.onbeforeunload=function(){if(!submitted&&currentExam)return "시험이 진행 중입니다.";}
</script>
